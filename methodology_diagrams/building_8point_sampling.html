<svg width="100%" viewBox="0 0 680 520" role="img">
<title>8-point pressure sampling on an HDB building</title>
<desc>Isometric building showing windward and leeward surface points with shell offsets at 0.5m, 2m, 3m</desc>
<defs>

</marker>
</defs>

<!-- Building faces -->
<!-- Top face -->
<polygon points="120,190 320,190 390,155 190,155" fill="#F1EFE8" stroke="var(--s)" stroke-width="0.5"/>
<!-- Side face (right) -->
<polygon points="320,420 390,385 390,155 320,190" fill="#D3D1C7" stroke="var(--s)" stroke-width="0.5"/>

<text class="ts" x="355" y="175" text-anchor="middle" fill="#993C1D">Leeward</text>

<line x1="30" y1="280" x2="100" y2="280" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="30" y1="330" x2="100" y2="330" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="30" y1="380" x2="100" y2="380" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>

<text class="ts" x="65" y="400" text-anchor="middle" fill="#185FA5">(-Y dir)</text>

<line x1="120" y1="374" x2="320" y2="374" stroke="var(--s)" stroke-width="0.4" stroke-dasharray="3 3" opacity="0.4"/>

<text class="ts" x="538" y="433" text-anchor="middle" fill="#185FA5">p from surface_fields</text>

<g class="lbl2">
<text class="ts" x="185" y="303" fill="#185FA5" opacity="0.7">0.5m</text>
<text class="ts" x="155" y="317" fill="#185FA5" opacity="0.7">2m</text>
<text class="ts" x="137" y="326" fill="#185FA5" opacity="0.7">3m</text>
</g>

<g class="g4">

<circle cx="279" cy="266" r="4" fill="#F0997B" stroke="#993C1D" stroke-width="0.8"/>

</g>
<g class="lbl4">

<text class="ts" x="548" y="378" text-anchor="middle" fill="#993C1D">④ a₀.₅  a₂  a₃ (shell)</text>
<text class="ts" x="548" y="393" text-anchor="middle" fill="#993C1D">IDW from volume_fields</text>
</g>

<g class="lbl4">
<text class="ts" x="285" y="261" fill="#993C1D" opacity="0.7">0.5m</text>
<text class="ts" x="307" y="249" fill="#993C1D" opacity="0.7">2m</text>
<text class="ts" x="323" y="243" fill="#993C1D" opacity="0.7">3m</text>
</g>

<!-- Connecting dashed line between windward and leeward surface points -->
<g class="lbl3">
<line x1="200" y1="305" x2="270" y2="270" stroke="var(--s)" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.3"/>
<text class="ts" x="242" y="296" text-anchor="middle" opacity="0.4">thickness</text>
</g>

<!-- Title -->
<text class="th" x="340" y="30" text-anchor="middle">8-point sampling per (floor, x-fraction) location</text>
<text class="ts" x="340" y="50" text-anchor="middle">4 windward + 4 leeward = 8 pressure values per sample</text>

<!-- Bottom summary -->
<text class="ts" x="340" y="505" text-anchor="middle" opacity="0.6">Total samples = Σ buildings × floors_per_building × 10 x-fractions</text>

</svg>
